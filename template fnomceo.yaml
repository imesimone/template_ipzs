openapi: 3.0.1
info:
  title: IT Wallet API - FNOMCeO Authentic Source
  version: 0.2.0
  description: |
    # IT Wallet Authentic Source e-Service esposto via PDND.
    API della Federazione Nazionale dei Medici Chirurghi e degli Odontoiatri per IT-Wallet.
    Gestisce il recupero dei dati certificati per la tessera professionale digitale, inclusi i dati anagrafici, 
    professionali e le immagini (logo e foto) in formato Base64.
  termsOfService: "https://www.fnomceo.it/termini-servizio/"
  contact:
    name: FNOMCeO - Supporto Tecnico
    url: "https://www.fnomceo.it/contatti/"
    email: ced@fnomceo.it
  x-api-id: FWAL-FNOMCEO-02
  x-summary: FNOMCeO Authentic Source per IT-Wallet.

servers:
  - url: https://api-gw.fnomceo.it/govway/rest/out/Zecca/fnomceo-tessera/v0.2.0
    description: Production Server (Gateway GovWay)

tags:
  - name: status
    description: Endpoint per il monitoraggio della disponibilità del servizio.
  - name: credential
    description: Servizi per il recupero dei claim delle credenziali professionali.

security:
  - BearerAuth: []

paths:
  /status:
    get:
      tags: [status]
      summary: Check status API
      description: Verifica lo stato operativo dell'API FNOMCeO per il monitoraggio della disponibilità.
      operationId: authenticSourceStatus
      responses:
        "200":
          description: Servizio disponibile
          headers:
            Cache-Control: { $ref: "#/components/headers/CacheControlHeader" }
            X-RateLimit-Limit: { $ref: "#/components/headers/RateLimitLimitHeader" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/RateLimitRemainingHeader" }
            X-RateLimit-Reset: { $ref: "#/components/headers/RateLimitResetHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "429":
          description: Too Many Requests
          headers:
            Retry-After: { $ref: "#/components/headers/RetryAfterHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "503":
          description: Service Unavailable
          headers:
            Retry-After: { $ref: "#/components/headers/RetryAfterHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /attribute-claims/medici-odontoiatri:
    post:
      tags: [credential]
      summary: Get Health Professional Attribute Claims
      description: |
        Recupera i dati completi della tessera professionale basati su ID ANPR o Codice Fiscale. 
        Garantisce l'integrità tramite pattern INTEGRITY_REST_02.
      operationId: attributeClaims
      parameters:
        - $ref: "#/components/parameters/Agid-JWT-Signature"
        - $ref: "#/components/parameters/Digest"
        - $ref: "#/components/parameters/Agid-JWT-TrackingEvidence"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CredentialClaimsRequest" }
      responses:
        "200":
          description: OK - Dati tessera recuperati con successo
          headers:
            Agid-JWT-Signature: 
              description: >-
                JWT containing the signature of the message headers whose integrity needs to be guaranteed, to comply with the INTEGRITY_REST_02 security pattern (see <a target="blank" href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <a target="blank" href="https://jwt.io/#debugger-io?token=ew0KICAiYWxnIjogIkVTMjU2IiwNCiAgImtpZCI6ICJhMWY1YzhkMi00YjM3LTRlOTEtYjBkMi03OWUzZjBjNGE4ZWYiLA0KICAidHlwIjogIkpXVCINCn0..DpuBNo2UgQhL7WLin4mpdZrbIpQq3tPvCX6HfktkxG7L5mk6a8OK1Hg0mQcZfFi3gelS-aL9kFS-6MoSy4csBg">EXAMPLE
              required: true
              schema: { type: string }
            Digest: 
              description: Digest of the message payload, to comply with the INTEGRITY_REST_02 security pattern. According to RFC 3230 Section 4.2 <a target="blank" href="https://www.rfc-editor.org/rfc/rfc3230.html#section-4.2">RFC 3230 §4.2</a>, the format MUST be the following digest-algorithm=encoded digest output.
              required: true
              schema: { type: string, example: SHA-256=79a20a744336420301830600ad9bdca993593f876209a004b599b583095b0a61 }
            Cache-Control: { $ref: "#/components/headers/CacheControlHeader" }
            X-RateLimit-Limit: { $ref: "#/components/headers/RateLimitLimitHeader" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/RateLimitRemainingHeader" }
            X-RateLimit-Reset: { $ref: "#/components/headers/RateLimitResetHeader" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FNOMCeOResponse" }
        "400":
          description: Bad Request
          headers:
            X-RateLimit-Limit: { $ref: "#/components/headers/RateLimitLimitHeader" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/RateLimitRemainingHeader" }
            X-RateLimit-Reset: { $ref: "#/components/headers/RateLimitResetHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "401":
          description: Unauthorized
          headers:
            X-RateLimit-Limit: { $ref: "#/components/headers/RateLimitLimitHeader" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/RateLimitRemainingHeader" }
            X-RateLimit-Reset: { $ref: "#/components/headers/RateLimitResetHeader" }
            WWW-Authenticate: { $ref: "#/components/headers/WWWAuthenticateHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "404":
          description: Claims not found
          headers:
            X-RateLimit-Limit: { $ref: "#/components/headers/RateLimitLimitHeader" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/RateLimitRemainingHeader" }
            X-RateLimit-Reset: { $ref: "#/components/headers/RateLimitResetHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "429":
          description: Too Many Requests
          headers:
            Retry-After: { $ref: "#/components/headers/RetryAfterHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "500":
          description: Internal Server Error
          headers:
            Retry-After: { $ref: "#/components/headers/RetryAfterHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "503":
          description: Service Unavailable
          headers:
            Retry-After: { $ref: "#/components/headers/RetryAfterHeader" }
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: PDND Bearer Token

  parameters:
    Agid-JWT-Signature:
      name: Agid-JWT-Signature
      in: header
      description: >-
        JWT containing the signature of the message headers whose integrity
        needs to be guaranteed, to comply with the INTEGRITY_REST_02
        security pattern (see <a target="blank"
        href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <br/><br/>

        <a target="blank" href="https://jwt.io/#debugger-io?token=eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..tG5-P96CCA6N1IYC-xk4GumoVkA3NFolpbBn2vQ2e9vpWQ8f5Sm2l4-1VrXfKTx-CUVz_puiwqkBhulrNKj2fA">EXAMPLE
        ON JWT.IO</a>
      required: true
      schema:
        type: string
        format: JWT
        example: eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..tG5-P96CCA6N1IYC-xk4GumoVkA3NFolpbBn2vQ2e9vpWQ8f5Sm2l4-1VrXfKTx-CUVz_puiwqkBhulrNKj2fA
    Digest:
      name: Digest
      in: header
      description: >-
        Digest of the message payload, to comply with the INTEGRITY_REST_02
        security pattern. According to <a target="blank" href="https://www.rfc-editor.org/rfc/rfc3230.html#section-4.2">RFC
        3230 §4.2</a>, the format MUST be the following: digest-algorithm=encoded
        digest output.
      required: true
      schema:
        type: string
        example: SHA-256=72e18bdddf13c911b4dd562ee21979a5c9f235c3a01bd1426e857d8c1a282f41
    Agid-JWT-TrackingEvidence:
      name: Agid-JWT-TrackingEvidence
      in: header
      description: >-
        If the Voucher type is Bearer, this header represents a JWT acting as a proof of possession, to comply with the REST_JWS_2021_POP security
        pattern using the POP_TPoP implementation. Otherwise, it is a JWT containing the data tracked in the Consumer's domain, to comply with AUDIT_REST_02 (see <a target="blank"
        href="https://italia.github.io/eid-wallet-it-docs/versione-corrente/en/e-service-pdnd.html">e-Service PDND</a>). <br/><br/>
        <a target="blank" href="https://jwt.io/#debugger-io?token=eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..y42yfMeW2H9h0b0j0BODUml8yF20stY9q3BwoVU5BB90afBj852Q0QlInncdhjXhUjLS1V76cGBxkutDNvxRNA">EXAMPLE
        ON JWT.IO</a>
      required: false
      schema:
        type: string
        format: JWT
        example: eyJhbGciOiJFUzI1NiIsImtpZCI6ImQ0YzNiMmExLTk4NzYtNTQzMi0xMGZlLWRjYmE5ODc2NTQzMiIsInR5cCI6IkpXVCJ9..tG5-P96CCA6N1IYC-xk4GumoVkA3NFolpbBn2vQ2e9vpWQ8f5Sm2l4-1VrXfKTx-CUVz_puiwqkBhulrNKj2fA

  headers:
    CacheControlHeader:
      description: Direttiva RFC 7234 (no-store per dati sensibili).
      schema: { type: string, enum: [no-store] }
    RateLimitLimitHeader:
      description: Numero massimo di richieste consentite nella finestra temporale.
      schema: { type: integer, format: int32, minimum: 0 }
    RateLimitRemainingHeader:
      description: Numero di richieste rimanenti nella finestra temporale.
      schema: { type: integer, format: int32, minimum: 0 }
    RateLimitResetHeader:
      description: Epoch UTC in secondi, corrispondente al momento in cui il limite verrà resettato.
      schema: { type: integer, format: int32, minimum: 0 }
    RetryAfterHeader:
      description: Secondi da attendere prima di effettuare una nuova richiesta (RFC 6585).
      schema: { type: integer, format: int32, minimum: 0 }
    WWWAuthenticateHeader:
      description: Indica che la richiesta non può essere soddisfatta perché il Voucher è scaduto o non valido.
      schema: { type: string, example: 'Bearer error="invalid_token", error_description="The access token expired"' }

  schemas:
    CredentialClaimsRequest:
      type: object
      required: [unique_id]
      properties:
        unique_id: { type: string, description: "ID ANPR o Codice Fiscale del professionista" }

    FNOMCeOResponse:
      type: object
      required: [userClaims, attributeClaims, metadataClaims]
      properties:
        userClaims:
          type: object
          properties:
            given_name: { type: string, example: "Mario" }
            family_name: { type: string, example: "Rossi" }
            birth_date: { type: string, format: date }
            birth_place: { type: string, description: "Corrisponde al luogo di nascita del professionista" }
            tax_id_code: { type: string }
        attributeClaims:
          type: array
          items:
            type: object
            required: [object_id, status, last_updated, issuing_organization_name, registration_number, organization_logo, professional_photo, card_serial_number, multilingual]
            properties:
              object_id: { type: string, description: "Identificativo univoco del Dataset." }
              status: 
                type: string
                enum: [VALID, INVALID, SUSPENDED]
                description: Stato del Dataset.
              last_updated: { type: string, format: date-time, description: "Ultimo aggiornamento del Dataset." }
              # Dati di business allineati allo schema delle professioni sanitarie
              issuing_organization_name: { type: string, description: "Denominazione ESTESA dell'Ordine Professionale Provinciale" }
              issuing_organization_short_name: { type: string, description: "Denominazione CORTA (es. OMCeO Roma)" }
              professional_albo: { type: string, enum: [M, O, M e O], description: "Albo Professionale di appartenenza" }
              registration_number: { type: string, example: "M:123, O:456", description: "Numero iscrizione all'Albo Professionale" }
              card_serial_number: { type: string, example: "RM-2026-12345", description: "Seriale della tessera" }
              enpam_number: { type: string, nullable: true, description: "Numero ENPAM" }
              multilingual: { type: string, enum: ["0", "1"], description: "Indicatore multilingua" }
              organization_logo: { type: string, format: byte, description: "Logo Ordine Professionale in Base64 (max 10KB)" }
              federation_logo: { type: string, format: byte, description: "Logo Federazione Nazionale (max 10KB)" }
              professional_photo: { type: string, format: byte, description: "Foto in Base64 (max 10KB)" }
        metadataClaims:
          type: array
          items:
            type: object
            required: [object_id, issuance_date, expiry_date]
            properties:
              object_id: { type: string, description: "Identificativo univoco del Dataset." }
              issuance_date: { type: string, format: date, description: "Data rilascio tessera" }
              expiry_date: { type: string, format: date, description: "Data scadenza tessera" }
        interval: { type: integer, format: int64, example: 864000 }

    ProblemDetails:
      type: object
      description: Oggetto conforme a RFC7807 per la segnalazione di errori.
      properties:
        type:
          type: string
          format: uri
          description: URI assoluto che identifica il tipo di problema.
        title:
          type: string
          description: Breve riepilogo leggibile del tipo di problema.
        status:
          type: integer
          format: int32
          description: Il codice di stato HTTP generato per questa occorrenza del problema.
        detail:
          type: string
          description: Spiegazione dettagliata e leggibile specifica per questa occorrenza del problema.
        instance:
          type: string
          format: uri
          description: URI assoluto che identifica l'occorrenza specifica del problema.
      required: [title, status, detail]
